<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Media - Boyuan's Homepage</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gaming-section {
            padding: 2rem 0;
        }

        .section-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d1d1f;
            letter-spacing: -0.02em;
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: unset;
            background-clip: unset;
        }

        .section-header p {
            font-size: 1.1em;
            color: #86868b;
            font-weight: 400;
        }

        .seasons-gallery {
            position: relative;
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            padding: 10px 0 2rem 0;
        }

        .seasons-gallery::-webkit-scrollbar {
            display: none;
        }

        .seasons-gallery {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .seasons-container {
            display: inline-flex;
            gap: 2rem;
            padding: 0 10px;
        }

        .season-card {
            flex: 0 0 auto;
            width: 420px;
            scroll-snap-align: center;
            transition: transform 0.4s ease;
        }

        .season-card:hover {
            transform: translateY(-4px);
        }

        .season-image-container {
            position: relative;
            width: 100%;
            background: #f5f5f7;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: box-shadow 0.4s ease;
        }

        .season-card:hover .season-image-container {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .season-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .season-info {
            padding: 1.5rem 0.5rem;
            text-align: center;
        }

        .season-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1d1d1f;
            letter-spacing: -0.01em;
        }

        .ranking-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ranking-item {
            font-size: 1rem;
            color: #86868b;
            font-weight: 400;
        }

        .ranking-item strong {
            color: #1d1d1f;
            font-weight: 600;
        }

        .scroll-indicator {
            text-align: center;
            margin-top: 1rem;
            color: #86868b;
            font-size: 0.85em;
            font-weight: 400;
        }

        @media (max-width: 768px) {
            .season-card {
                width: 300px;
            }

            .section-header h2 {
                font-size: 2rem;
            }
        }

        .news-archive-section {
            padding: 2rem 0 1rem 0;
        }
        .news-archive-section .section-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .news-archive-section .section-header h2 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d1d1f;
            letter-spacing: -0.02em;
        }
        .news-archive-section .section-header p {
            font-size: 1.1em;
            color: #86868b;
            font-weight: 400;
        }
        .news-archive-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .news-card {
            border: 1px solid #e8e8ed;
            border-radius: 12px;
            padding: 1.25rem;
            background-color: #fff;
            transition: box-shadow 0.3s ease;
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
        }
        .news-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        .news-card .news-card-date {
            flex-shrink: 0;
            width: 90px;
            color: #86868b;
            font-weight: 600;
            font-size: 0.85rem;
            padding-top: 2px;
        }
        .news-card .news-card-content {
            flex: 1;
            color: #1d1d1f;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .news-card .news-card-content p {
            margin: 0 0 0.5rem 0;
        }
        .news-card .news-card-content p:last-child {
            margin-bottom: 0;
        }
        .news-card-link {
            color: #0071e3;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .news-card-link:hover {
            color: #0077ed;
        }
        .section-divider-horizontal {
            border: none;
            border-top: 1px solid #d2d2d7;
            margin: 3rem auto;
            max-width: 800px;
        }
        @media (max-width: 576px) {
            .news-card {
                flex-direction: column;
                gap: 0.5rem;
            }
            .news-card .news-card-date {
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <div class="profile">
                <img src="../figures/profile.jpg" alt="Bryan(Boyuan) Deng" class="profile-img">
                <h1>Bryan(Boyuan) Deng</h1>
                <p class="hometown" style="font-style: normal;"><span class="label">Hometown: </span>L77星</p>
                <p class="affiliation">Johns Hopkins University</p>
                
                <!-- Social Links -->
                <div class="social-links">
                    <a href="https://www.linkedin.com/in/boyuandeng1/" target="_blank">
                        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v3/icons/linkedin.svg" alt="LinkedIn" style="width: 1em; height: 1em; vertical-align: middle; filter: invert(1);">
                    </a>
                    <a href="https://github.com/bydeng01" target="_blank">
                        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v3/icons/github.svg" alt="GitHub" style="width: 1em; height: 1em; vertical-align: middle; filter: invert(1);">
                    </a>
                    <a href="https://leetcode.com/u/bydeng01/" target="_blank">
                        <img src="https://leetcode.com/static/images/LeetCode_logo_rvs.png" alt="LeetCode" style="width: 1em; height: 1em; vertical-align: middle;">
                    </a>
                    <a href="https://www.kaggle.com/bryanboyuan" target="_blank">
                        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v3/icons/kaggle.svg" alt="Kaggle" style="width: 1em; height: 1em; vertical-align: middle; filter: invert(1);">
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Add top navigation -->
            <nav class="top-nav">
                <a href="/">Home</a>
                <a href="publications.html">Publications</a>
                <a href="projects.html">Projects</a>
                <a href="media.html" class="active">News & Media</a>
                <a href="blog.html">Blog</a>
            </nav>

            <section id="news-archive" class="news-archive-section">
                <div class="section-header">
                    <h2>News</h2>
                    <p>Recent updates, talks, and milestones</p>
                </div>
                <div class="news-archive-list" id="newsArchiveList">
                    <!-- Populated by js/news.js -->
                </div>
            </section>
            <hr class="section-divider-horizontal">

            <section id="gaming" class="gaming-section">
                <div class="section-header">
                    <h2>Gaming</h2>
                </div>

                <div class="seasons-gallery">
                    <div class="seasons-container">
                        <!-- Season 8 -->
                        <div class="season-card">
                            <div class="season-image-container">
                                <img src="../figures/S8.PNG" alt="Season 8 Finals Ranking">
                            </div>
                            <div class="season-info">
                                <h3 class="season-title">Season 8</h3>
                                <div class="ranking-info">
                                    <div class="ranking-item">Overall ranking: <strong>2561</strong></div>
                                    <div class="ranking-item">Ranking in North America: <strong>1131</strong></div>
                                </div>
                            </div>
                        </div>

                        <!-- Future seasons will be added here -->
                    </div>
                </div>

                <div class="scroll-indicator">
                    Scroll to explore more seasons →
                </div>
            </section>
        </div>
    </div>
    <script src="../js/news.js"></script>
    <script>
        (function renderNewsArchive() {
            const list = document.getElementById('newsArchiveList');
            if (!list || typeof newsItems === 'undefined') return;
            if (newsItems.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #86868b;">No news yet. Check back soon.</p>';
                return;
            }
            list.innerHTML = newsItems.map(item => {
                const body = item.detail || item.text;
                const linkHtml = item.link
                    ? `<p><a href="${item.link}" target="_blank" rel="noopener" class="news-card-link">${item.linkText || 'Learn more'} →</a></p>`
                    : '';
                return `
                    <div class="news-card">
                        <div class="news-card-date">${item.date}</div>
                        <div class="news-card-content">
                            <p>${body}</p>
                            ${linkHtml}
                        </div>
                    </div>
                `;
            }).join('');
        })();
    </script>
</body>
</html>
